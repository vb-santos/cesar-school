<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sistema Web - Frontend</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    input, button { padding: 8px; margin: 4px 0; }
    .usuarios { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Registrar Usuário</h1>
  <form id="form">
    <label>Nome:<br/><input type="text" id="nome" required></label><br/>
    <label>Email:<br/><input type="email" id="email" required></label><br/>
    <button type="submit">Enviar</button>
  </form>

  <div class="usuarios">
    <h2>Usuários cadastrados</h2>
    <ul id="lista"></ul>
  </div>

  <script>
    const API = "/usuarios"; // Nginx fará proxy pass ou, se estiver na mesma rede, o navegador acessa frontend que chama backend relativo.

    async function listar() {
      try {
        const res = await fetch(API);
        const users = await res.json();
        const ul = document.getElementById('lista');
        ul.innerHTML = users.map(u => `<li>${u.id} — ${u.nome} &lt;${u.email}&gt;</li>`).join('');
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email })
        });
        if (!res.ok) {
          const err = await res.json();
          alert("Erro: " + (err.error || res.status));
        } else {
          document.getElementById('nome').value = '';
          document.getElementById('email').value = '';
          await listar();
        }
      } catch (err) {
        console.error(err);
        alert("Erro ao conectar com a API");
      }
    });

    // Carrega ao iniciar
    listar();
  </script>
</body>
</html>
